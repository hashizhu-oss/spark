<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style type="text/css">
            h2{
                border-style: double;
            }
            .one{
                border-style: dotted solid;
            }
            .two{
                border-style: solid dashed;
            }
    </style>
</head>
<body>
    <h2>《已亥杂诗》</h2>
    <p class="one">段落1：浩荡离愁白日斜，吟鞭东指即天涯</p>
    <p class="two">段落2：落红不是无情物，化作春泥更护花</p>
</body>
