<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Table 布局</title>
<style>
  table {
    max-width: 100px;
    margin: 20px auto;
    border-collapse: collapse;
  }
  td {
    padding: 100px;
    vertical-align: middle;
  }
  img {
    width: 350px;
    height: auto;
  }
</style>
</head>
<body> 

<table>
  <tr>
    <td><img src="../chapter04/images/book_1.png"></td>
    <td>
      <p>爱岗敬业，无私奉献，爱岗敬业，无私奉献</p>
    </td>
  </tr>
</table>

</body>
</html>
