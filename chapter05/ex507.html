<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            list-style: none;
            outline: none;
        }

        .bg {
            width: 600px;
            height: 550px;
            background-image: repeating-radial-gradient(circle at 50% 50%, #333, #000 1%);
            margin: 50px auto;
            padding: 40px;
            border-radius: 50%;
            padding-top: 50px;
            border: 10px solid #ccc;
        }

        ul {
            width: 372px;
            height: 530px;
            background: #fff;
            border-radius: 30px;
            box-shadow: 15px 15px 12px #000;
            margin: 0 auto;
        }

        ul li {
            width: 372px;
            height: 55px;
            background: #504d58 url(images/huo.png) no-repeat 70px 20px;
            margin-bottom: 2px;
            font-size: 18px;
            color: #d6d6d6;
            line-height: 55px;
            text-align: center;
            font-family: "微软雅黑";
        }

        ul .tp {
            width: 372px;
            height: 247px;
            background: #fff;
            background-image: url(images/gandong.png), url(images/wenzi.png);
            background-repeat: no-repeat;
            background-position: 87px 16px, 93px 192px;
            border-radius: 30px 30px 0 0;
        }

        ul .yj {
            border-radius: 0 0 30px 30px;
        }
    </style>
</head>

<body>
    <div class="bg">
        <ul>
            <li class="tp"></li>
            <li>彭士禄</li>
            <li>杨振宁</li>
            <li>顾永芬</li>
            <li>吴天</li>
            <li class="yj">朱彦夫</li>
        </ul>
    </div>
</body>

</html>
