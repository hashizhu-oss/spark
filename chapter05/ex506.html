<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        #boxwrap {
            width: 330px;
            margin: 10px auto;
            border: solid 1px #ff666f;
        }

        img:first-child {
            opacity: 1;
        }

        img:nth-child(2) {
            opacity: 0.8;
        }

        img:nth-child(3) {
            opacity: 0.5;
        }

        img:nth-child(4) {
            opacity: 0.0;
        }

        p {
            width: 200px;
            height: 200px;
            border: #ff666f 1px solid;
            background-color: rgba(255, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div id="boxwrap">
        <img src="images/hong.png" width="160">
        <img src="images/hong.png" width="160">
        <img src="images/hong.png" width="160">
        <img src="images/hong.png" width="160">
    </div>
</body>

</html>
