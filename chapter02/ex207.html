    <p>余幼好书，家贫难致。有张氏藏书甚富。往借，不与，归而形诸梦。其切如是。故有所览辄省记。
        通籍后，俸去书来，落落大满，素蟫灰丝时蒙卷轴。然后叹借者之用心专，而少时之岁月为可惜也！
        今黄生贫类予，其借书亦类予；惟予之公书与张氏之吝书若不相类。然则予固不幸而遇张乎，生固幸而遇予乎？
        知幸与不幸，则其读书也必专，而其归书也必速。</p>
