<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本格式化标签</title>
</head>

<body>
    <p>文本正常标签</p>
    <p><b>文本加粗标签</b></p>
    <p><strong>文本加粗标签,强调语义</strong></p>
    <p><u>文本添加下划线样式显示</u></p>
    <p><ins>文本已添加下划线样式,强调语义</ins></p>
    <p><em>文本斜体显示，强调语义</em></p>
    <p>文本添加删除线的样式显示</p>
    <p><del>文本添加删除线的样式显示，强调语义</del></p>
     
</body>
</html>
