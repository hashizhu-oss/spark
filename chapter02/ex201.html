    <h2>莫生气</h2>
    <hr color="red" align="left" size="5" width="600" ></hr>
    <p>人生就像一场戏，因为有缘才相聚。相符到老不容易，是否更应该去珍惜。为了小事发脾气回头想想又何必<br>
    别人生气我不气，气出病来无人替。我若气死谁在意，何况伤身又费力。亲朋好友不要比，儿孙琐事由他去<br>吃苦享福在一起
神仙羡慕好伴侣</p>
