<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id选择器</title>
    <style type="text/css">
        #bold {
            font-weight: bold;
        }

        #font24 {
            font-size: 24px;
        }
    </style>
</head>

<body>
    <p id="bold">段落1设粗体文字</p>
    <p id="font24">段落2设文字字体为24px</p>
    <p id="font24">段落3设文字字体为24px</p>
    <p id="bold font24">段落4设粗体文字而且字体为24px</p>
</body>

</html>
